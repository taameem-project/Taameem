<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taameem Login</title>

<link rel="stylesheet" href="login.css">


</head>

<body>

<header class="header">

<div class="logo-area">
<img src="../img/Logo_Description_for_Taameem 3 copy.png" class="logo">
<!-- <span class="brand">Taameem</span> -->
</div>



</header>

<main class="login-wrapper">

<div class="login-card">

<h2>Login to Taameem</h2>
<p class="subtitle">Government Circular Management Platform</p>

<img src="../img/Logo_Description_for_Taameem 3 copy.png" class="login-logo">

<label class="label">ACCOUNT TYPE</label>

<div class="account-switch">
<button class="active">Ministry</button>
<button>University</button>
</div>

<label class="label">Official Email</label>

<input type="email"
placeholder="name@ministry.gov.om"
class="input">

<div class="password-row">

<label>Password</label>

<a href="#">Forgot Password?</a>

</div>

<div class="password-field">

<input type="password"
placeholder="••••••••"
class="input">

<span class="eye">👁</span>

</div>

<div class="remember">

<input type="checkbox">
<span>Keep me logged in</span>

</div>

<button class="login-btn">

Login →
</button>

<div class="divider">OR</div>

<p class="create">

Don't have an account?
<a href="#">Create Account</a>

</p>

</div>

</main>

<footer class="footer">

<span>Secure 256-bit AES</span>

<span>Government Cloud Certified</span>

</footer>

<script src="login.js"></script>

</body>
</html>
