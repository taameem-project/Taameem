<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taameem Login</title>

<link rel="stylesheet" href="login.css">


</head>

<body>

<header class="header">

<div class="logo-area">
<img src="../img/Logo_Description_for_Taameem 3 copy.png" class="logo">
<!-- <span class="brand">Taameem</span> -->
</div>

<div class="header-menu">
    <div class="language-switch">
    <a href=""><img src="../img/world.png" class="language-icon"></a>
    <span>العربية</span>
    </div>
 <div>
    <a href=""><img src="../img/faq.png" alt="Support" class="Support-icon"></a>
    <span>Support</span>
 </div>   

</div>

</header>

<main class="login-wrapper">

<div class="login-card">

<h2>Login to Taameem</h2>
<p class="subtitle">Government Circular Management Platform</p>

<img src="../img/Logo_Description_for_Taameem 3 copy.png" class="login-logo">

<label class="label">ACCOUNT TYPE</label>

<div class="account-switch">
    <button class="active"><img src="../img/ministry.png" alt="ministry" class="icon"> Ministry</button>
    <button><img src="../img/universty.png"alt="University" class="icon"> University</button>
</div>

<label class="label">Official Email</label>

<div class="input-icon-wrapper">
    <img src="../img/email.png" alt="Email" class="input-icon">
    <input type="email" placeholder="name@ministry.gov.om" class="input has-icon">
</div>

<div class="password-row">

<label class="label">Password</label>

<a href="#" class="forgot-password">Forgot Password?</a>

</div>

<div class="password-field">

<input type="password"
placeholder="••••••••"
class="input">

<span class="eye">👁</span>

</div>

<div class="remember">

<input type="checkbox">
<span>Keep me logged in</span>

</div>

<button class="login-btn">

Login →
</button>

<div class="divider">OR</div>

<p class="create">

Don't have an account?
<a href="#">Create Account</a>

</p>

</div>

</main>

<footer class="footer">

<span>Secure 256-bit AES</span>

<span>Government Cloud Certified</span>

</footer>

<script src="login.js"></script>

</body>
</html>
